<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Bulb Project</h1>
    <button
      type="button"
      id="on"
      onclick="document.getElementById('onBulb').src = '../Media/Bulbon.jpg'"
    >
      Turn on the Light
    </button>
    <img
      src="../Media/Bulboff.jpg"
      alt="Bulb"
      height="200"
      width="200"
      id="onBulb"
    />
    <button
      type="button"
      id="off"
      onclick="document.getElementById('onBulb').src = '../Media/Bulboff.jpg'"
    >
      Turn off the Light
    </button>
  </body>
</html>
